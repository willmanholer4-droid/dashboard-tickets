<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Tickets</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 20px; }
    h1 { color: #d60000; }
    .card { background: white; padding: 15px; margin-top: 10px; border-radius: 10px; }
    button { background: red; color: white; padding: 10px; border: none; border-radius: 5px; }
  </style>
</head>
<body>

<h1>Dashboard de Tickets</h1>

<input type="file" id="upload" />

<div id="resultado" class="card"></div>

<script>
document.getElementById('upload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, {type: 'array'});

    let total = 0;
    let concluido = 0;
    let pendente = 0;
    let aguardando = 0;

    workbook.SheetNames.forEach(nome => {
      const sheet = XLSX.utils.sheet_to_json(workbook.Sheets[nome]);

      sheet.forEach(row => {
        total++;

        const status = (row.Status || "").toLowerCase();

        if (status.includes("concl")) concluido++;
        if (status.includes("pendente")) pendente++;
        if (status.includes("aguard")) aguardando++;
      });
    });

    document.getElementById("resultado").innerHTML = `
      <h2>Resumo</h2>
      <p>Total: ${total}</p>
      <p>Concluídos: ${concluido}</p>
      <p>Pendente Cliente: ${pendente}</p>
      <p>Aguardando Tratativa: ${aguardando}</p>
    `;
  };

  reader.readAsArrayBuffer(file);
});
</script>

</body>
</html>
